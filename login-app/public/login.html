<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="/style.css">
    </head>

    <body>
        <div class="container">
            <h1>Login</h1>

            <form id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                
                <button type="submit">Login</button>
                <div id="loginMessage" class="message"></div>
            </form>

            <p class="switch-link">
                Don't have an account? 
                <a href="/register.html">
                    Create one
                </a>
            </p>
        </div>

        <script>
            document.querySelector("#loginForm").addEventListener("submit", async (_error) => 
            {
                _error.preventDefault()
                const messageDiv = document.querySelector("#loginMessage")
                messageDiv.textContent = "Logging in..."
                messageDiv.className = "message info"

                const email = document.querySelector("#email").value 
                const password = document.querySelector("#password").value
                
                try
                {
                    const response = await fetch("/api/auth/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ email, password })
                    })

                    const data = await response.json()

                    if(data.success)
                    {
                        messageDiv.textContent = `${data.message} Welcome, ${data.user.email}!`
                        messageDiv.className = "message success"
                    }
                    else 
                    {
                        messageDiv.textContent = `${data.message}`
                        messageDiv.className = "message error"
                    }
                }
                catch(error)
                {
                    messageDiv.textContent = "Network error. Please try again."
                    messageDiv.className = "message error"
                }
            })
        </script>
    </body>
</html>
