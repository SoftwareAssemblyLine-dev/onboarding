<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Create Account</title>
        <link rel="stylesheet" href="/style.css">
    </head>

    <body>
        <div class="container">
            <h1>Create Account</h1>

            <form id="registerForm">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6">
                
                <button type="submit">Create Account</button>
                <div id="registerMessage" class="message"></div>
            </form>

            <p class="switch-link">Already have an account? 
                <a href="/login.html">Log in</a>
            </p>
        </div>

        <script>
            document.querySelector("#registerForm").addEventListener("submit", async (_error) => 
            {
                _error.preventDefault()
                const messageDiv = document.querySelector("#registerMessage")
                messageDiv.textContent = "Create account..."
                messageDiv.className = "message info"

                const email = document.querySelector("#email").value
                const password = document.querySelector("#password").value

                try
                {
                    const response = await fetch("/api/auth/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password })
                    })

                    const data = await response.json()

                    if(data.success)
                    {
                        messageDiv.textContent = `${data.message}`
                        messageDiv.className = "message success"

                        //Redirect to login page after 2 seconds
                        setTimeout(() => {
                            window.location.href = "/login.html"
                        }, 2000)
                    }
                    else
                    {
                        const errorMessage = data.errors ? data.errors.join(" ") : data.message

                    }
                }
                catch(error)
                {
                    messageDiv.textContent = "Network error. Please try again."
                    messageDiv.className = "message error"
                }
            })
        </script>
    </body>
</html>
